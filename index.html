<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asha Ahmed (ashaahmed7)</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
  </head>

  <body>
    <!-- Header = Title + Search filters -->
    <header class="center">
      <h1>TV Show Episode Guide</h1>
      <div class="search-wrap">
        <select id="show-select"></select>
        <select id="ep-select">
          <option value="all-episodes">Show all episodes</option>
        </select>
        <input
          type="text"
          id="search-input"
          placeholder="Search episodes..."
          aria-label="Search"
        />
        <p id="ep-count" class="subtitle"></p>
      </div>
    </header>

    <hr style="width: 90%" />

    <!-- Main = All episodes card layout -->
    <main>
      <div class="ep-container">
        <template id="ep-card">
          <section class="ep-section">
            <img class="ep-img" />
            <h3 class="ep-title"></h3>
            <p class="ep-summary"></p>
          </section>
        </template>
      </div>
    </main>

    <!-- Footer = TVMaze mention here -->
    <footer class="center">
      <p>Data originally from TVMaze.com</p>
    </footer>
  </body>
</html>
